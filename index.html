<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOLLATERAL — Lateral Movement Reference</title>
<style>
:root{
  --bg:#0d0d0f;--bg2:#131316;--bg3:#1a1a1e;--bg4:#222228;
  --border:#2e2e38;--border2:#3a3a48;
  --text:#e8e8f0;--text2:#9898b0;--text3:#5a5a70;
  --purple:#a78bfa;--purple-bg:#1e1730;--purple-border:#4c3a8a;
  --teal:#34d399;--teal-bg:#0d2d22;--teal-border:#1a5c44;
  --blue:#60a5fa;--blue-bg:#0d1f35;--blue-border:#1a3d6e;
  --amber:#fbbf24;--amber-bg:#2a1f08;--amber-border:#5a4010;
  --coral:#f87171;--coral-bg:#2a0f0f;--coral-border:#5a1a1a;
  --green:#86efac;--green-bg:#0d2a18;--green-border:#1a5230;
  --pink:#f472b6;--pink-bg:#2a0f20;--pink-border:#5a1a40;
  --gray:#94a3b8;--gray-bg:#1a1a22;--gray-border:#2e2e40;
  --red:#fc8181;--red-bg:#2a0d0d;--red-border:#5a1a1a;
  --mono:'Fira Code','Cascadia Code','Consolas',monospace;
  --sans:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.header{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);background:var(--bg2)}
.logo{font-size:28px;font-weight:700;letter-spacing:-1px;font-family:var(--mono)}
.logo .hl{color:var(--purple)}
.tagline{font-size:13px;color:var(--text2);margin-top:6px}
.sub-links{margin-top:10px;display:flex;gap:14px}
.sub-links a{font-size:12px;color:var(--text2);border:1px solid var(--border);padding:3px 10px;border-radius:4px}
.sub-links a:hover{border-color:var(--border2);color:var(--text);text-decoration:none}

.controls{
  padding:1rem 2rem;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  position:sticky;top:0;z-index:100;
}
input[type=text]{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:4px;font-size:13px;font-family:var(--sans);
  width:240px;outline:none;
}
input[type=text]:focus{border-color:var(--border2)}
select{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:4px;font-size:13px;font-family:var(--sans);
  outline:none;cursor:pointer;
}
select:focus{border-color:var(--border2)}
.btn-expand{
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:6px 12px;border-radius:4px;font-size:13px;cursor:pointer;margin-left:auto;
}
.btn-expand:hover{border-color:var(--border2);color:var(--text)}

/* APT dropdown */
.apt-filter-wrap{position:relative}
.apt-search-input{width:160px!important}
.apt-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;z-index:200;
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  width:210px;max-height:230px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.apt-dropdown.open{display:block}
.apt-opt{
  padding:6px 12px;font-size:12px;cursor:pointer;
  border-bottom:1px solid var(--border);font-family:var(--mono);
  display:flex;align-items:center;gap:6px;color:var(--text2);
}
.apt-opt:last-child{border-bottom:none}
.apt-opt:hover{background:var(--bg4);color:var(--text)}
.apt-opt.sel{color:var(--purple)}
.apt-opt.sel::before{content:'✓';font-size:10px;color:var(--purple)}
.apt-opt:not(.sel)::before{content:'';display:inline-block;width:10px}

/* Multi-select (nation/sector) */
.ms-filter-wrap{position:relative}
.ms-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;z-index:200;
  background:var(--bg3);border:1px solid var(--border2);border-radius:4px;
  width:200px;max-height:220px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.ms-dropdown.open{display:block}
.ms-opt{
  padding:5px 12px;font-size:12px;cursor:pointer;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;color:var(--text2);
}
.ms-opt:last-child{border-bottom:none}
.ms-opt:hover{background:var(--bg4);color:var(--text)}
.ms-opt.sel{color:var(--blue)}
.ms-opt.sel::before{content:'✓';font-size:10px;color:var(--blue);width:10px}
.ms-opt:not(.sel)::before{content:'';display:inline-block;width:10px}

.active-tags-bar{
  padding:6px 2rem;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:8px;flex-wrap:wrap;min-height:34px;align-items:center;
}
.filter-chip{
  font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:3px;
  cursor:pointer;display:inline-flex;align-items:center;gap:4px;
}
.fc-apt{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.fc-nation{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.fc-sector{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.filter-chip:hover{opacity:.8}

.stats-bar{
  padding:8px 2rem;font-size:12px;color:var(--text3);
  background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;gap:20px;flex-wrap:wrap;
}
.stats-bar b{color:var(--text2)}

.list{padding:1rem 2rem 3rem}

.card{
  border:1px solid var(--border);border-radius:6px;background:var(--bg2);
  margin-bottom:8px;overflow:hidden;transition:border-color .15s;
}
.card:hover{border-color:var(--border2)}
.card.expanded{border-color:var(--border2)}

.card-head{
  padding:12px 16px;cursor:pointer;
  display:flex;align-items:flex-start;gap:12px;user-select:none;
}
.card-title{font-size:14px;font-weight:600;color:var(--text);flex:1;line-height:1.4}
.card-desc{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chevron{color:var(--text3);font-size:12px;margin-top:3px;transition:transform .2s;flex-shrink:0}
.expanded .chevron{transform:rotate(180deg)}

.badge{
  font-size:11px;padding:2px 7px;border-radius:3px;
  font-family:var(--mono);font-weight:400;white-space:nowrap;
}
.b-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.b-teal{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.b-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-coral{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-pink{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-border)}
.b-gray{background:var(--gray-bg);color:var(--gray);border:1px solid var(--gray-border)}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

.card-body{display:none;border-top:1px solid var(--border);padding:16px}
.expanded .card-body{display:block}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}

.section-label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:8px;font-family:var(--mono);
}
.code-block{
  font-family:var(--mono);font-size:12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:4px;padding:12px;
  white-space:pre-wrap;word-break:break-all;
  line-height:1.7;color:#c8d4e8;
  max-height:300px;overflow-y:auto;
}

.ioc-list{font-size:12px;font-family:var(--mono);color:var(--text2)}
.ioc-list div{padding:3px 0;border-bottom:1px solid var(--border);display:flex;gap:8px}
.ioc-list div:last-child{border-bottom:none}
.ioc-type{color:var(--text3);min-width:70px;font-size:11px}

.intel-sep{border-top:1px dashed var(--border);margin:20px 0 16px}
.intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.intel-grid{grid-template-columns:1fr}}

/* APT Table */
.apt-table{width:100%;border-collapse:collapse;font-size:12px}
.apt-table tr{border-bottom:1px solid var(--border)}
.apt-table tr:last-child{border-bottom:none}
.apt-table td{padding:6px 8px;vertical-align:top;line-height:1.5}
.apt-name{font-weight:600;color:var(--text);white-space:nowrap;min-width:120px}
.apt-alias{color:var(--text3);font-size:11px;font-family:var(--mono);display:block;margin-top:2px}
.apt-nation{font-size:11px;font-family:var(--mono);color:var(--amber);white-space:nowrap;min-width:130px}
.apt-campaigns{font-size:11px;color:var(--text2);min-width:180px}
.apt-sectors{font-size:11px;color:var(--teal)}
.apt-ref-link{font-size:10px;color:var(--blue);font-family:var(--mono);white-space:nowrap}
.apt-ref-link:hover{text-decoration:underline}
.apt-th td{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:4px 8px;background:var(--bg3)}

/* TI items */
.ti-item{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.ti-item:last-child{border-bottom:none}
.ti-src{min-width:110px;font-size:11px;font-family:var(--mono);color:var(--purple);flex-shrink:0}
.ti-text{color:var(--text2);line-height:1.5}

/* Rule items */
.rule-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);align-items:baseline;font-size:12px}
.rule-item:last-child{border-bottom:none}
.rule-src{min-width:90px;font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px;flex-shrink:0;text-align:center}
.src-sigma{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.src-elastic{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.src-splunk{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.src-sentinel{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.src-car{background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-border)}
.src-d3fend{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.src-attck{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}
.rule-link{color:var(--blue);flex:1}
.rule-link:hover{text-decoration:underline}
.rule-note{color:var(--text3);font-size:11px;font-family:var(--mono);display:block;margin-top:1px}

/* Merged Telemetry + Detection table */
.teldet-table{width:100%;border-collapse:collapse;font-size:12px}
.teldet-table tr{border-bottom:1px solid var(--border)}
.teldet-table tr:last-child{border-bottom:none}
.teldet-table td{padding:6px 8px;vertical-align:top;line-height:1.5}
.teldet-th td{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);padding:4px 8px;background:var(--bg3)}
.td-src{font-family:var(--mono);font-size:11px;color:var(--amber);white-space:nowrap;min-width:155px;font-weight:600}
.td-ids{font-family:var(--mono);font-size:11px;color:var(--purple);min-width:130px}
.td-pattern{font-size:12px;color:var(--text2)}
.td-sev{white-space:nowrap;font-family:var(--mono);font-size:11px;min-width:58px;text-align:right}
.hi-critical{color:var(--red)}
.hi-high{color:var(--coral)}
.hi-med{color:var(--amber)}
.hi-low{color:var(--text2)}

/* D3FEND */
.d3-list{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.d3-row{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.d3-row:last-child{border-bottom:none}
.d3-type{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:3px;flex-shrink:0;text-align:center;min-width:70px}
.d3-harden{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
.d3-detect{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.d3-desc{color:var(--text2);line-height:1.5}

.footer-bar{
  margin-top:16px;padding-top:12px;border-top:1px solid var(--border);
  display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text3);
  font-family:var(--mono);
}
.footer-bar span b{color:var(--text2)}
.no-results{text-align:center;padding:4rem 2rem;color:var(--text3);font-size:14px}

/* APT enriched table */
.apt-timeline{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:3px;display:flex;gap:10px}
.apt-fs{color:var(--teal)}.apt-ls{color:var(--amber)}
.apt-victims{font-size:11px;color:var(--text3);font-style:italic;display:block;margin-top:2px;line-height:1.4}
.apt-countries{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px}
.apt-ctry{font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:2px;
  background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);white-space:nowrap}
.apt-pm{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.apt-pm-link{font-size:10px;font-family:var(--mono);color:var(--purple);display:inline-block;
  padding:1px 6px;border-radius:2px;background:var(--purple-bg);border:1px solid var(--purple-border);white-space:nowrap}
.apt-pm-link:hover{opacity:.8;text-decoration:none}
/* D3FEND detect type */
.d3-detect{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.d3-evict{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}



/* APT enriched table */
.apt-timeline{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:3px;display:flex;gap:10px}
.apt-fs{color:var(--teal)}.apt-ls{color:var(--amber)}
.apt-victims{font-size:11px;color:var(--text3);font-style:italic;display:block;margin-top:2px;line-height:1.4}
.apt-countries{margin-top:4px;display:flex;flex-wrap:wrap;gap:3px}
.apt-ctry{font-size:10px;font-family:var(--mono);padding:1px 5px;border-radius:2px;
  background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);white-space:nowrap}
.apt-pm{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
.apt-pm-link{font-size:10px;font-family:var(--mono);color:var(--purple);display:inline-block;
  padding:1px 6px;border-radius:2px;background:var(--purple-bg);border:1px solid var(--purple-border);white-space:nowrap}
.apt-pm-link:hover{opacity:.8;text-decoration:none}
/* D3FEND detect type */
.d3-detect{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.d3-evict{background:var(--coral-bg);color:var(--coral);border:1px solid var(--coral-border)}


/* ── D3FEND inline diagram ──────────────────────────────── */
.d3viz-wrap{
  margin-top:14px;
  border:1px solid var(--border);
  border-radius:6px;
  overflow:hidden;
  background:var(--bg);
}
.d3viz-toggle{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  cursor:pointer;
  font-size:11px;font-family:var(--mono);
  color:var(--text2);
  background:var(--bg3);
  border-bottom:1px solid transparent;
  user-select:none;
  transition:background .15s;
}
.d3viz-toggle:hover{background:var(--bg4,#222228);color:var(--text)}
.d3viz-toggle .d3v-arr{
  transition:transform .2s;font-size:10px;color:var(--teal);
}
.d3viz-toggle.open .d3v-arr{transform:rotate(90deg)}
.d3viz-toggle.open{border-bottom:1px solid var(--border)}
.d3viz-body{display:none;padding:16px}
.d3viz-body.open{display:block}
.d3viz-body svg{width:100%;height:auto;display:block}
.d3viz-meta{
  margin-top:8px;
  font-size:10px;font-family:var(--mono);color:var(--text3);
  display:flex;gap:12px;flex-wrap:wrap;
}
.d3viz-meta a{color:var(--blue)}
/* SVG node styles inside diagram */
.d3n{cursor:pointer}
.d3n rect{transition:opacity .15s,stroke-width .15s}
.d3n:hover rect{opacity:.85;stroke-width:2}
.d3n-title{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:600;fill:#e8e8f0}
.d3n-id{font-family:'Fira Code',monospace;font-size:9.5px;fill:#9898b0}
.d3n-tac{font-family:'Fira Code',monospace;font-size:8.5px;fill:#5a5a70}
.d3n-art rect{fill:#131630;stroke:#818cf8;stroke-width:1.5}
.d3n-evict rect{fill:#2a0f0f;stroke:#f87171;stroke-width:1}
.d3n-harden rect{fill:#2a1f08;stroke:#fbbf24;stroke-width:1}
.d3n-detect rect{fill:#0d1f35;stroke:#60a5fa;stroke-width:1}
.d3n-restore rect{fill:#0d2a18;stroke:#86efac;stroke-width:1}
.d3n-model rect{fill:#1e1730;stroke:#a78bfa;stroke-width:1}
.d3n-art-title{font-family:'Fira Code',monospace;font-size:12px;font-weight:700;fill:#818cf8}
.d3n-art-sub{font-family:'Fira Code',monospace;font-size:9px;fill:#5a5a70}
.d3conn{stroke:#2e2e38;fill:none;stroke-width:0.8}
/* D3FEND inline tooltip */
.d3-itip{
  position:fixed;background:var(--bg3);border:1px solid var(--border2);
  border-radius:5px;padding:8px 12px;font-size:11px;max-width:260px;
  pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;
  line-height:1.55;box-shadow:0 6px 20px rgba(0,0,0,.6);
}
.d3-itip.vis{opacity:1}
.d3-itip b{color:var(--text);display:block;font-size:12px;margin-bottom:3px}
.d3-itip small{color:var(--text3);font-family:var(--mono)}


.d3viz-legend{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-top:10px;padding-top:8px;
  border-top:1px solid var(--border);
}
.d3viz-leg{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-family:var(--mono);color:var(--text3);
}
.d3viz-leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<div class="header">
  <div class="logo">LOL<span class="hl">LATERAL</span></div>
  <div class="tagline">Living Off the Land — Lateral Movement Complete Reference &nbsp;·&nbsp; MITRE ATT&amp;CK TA0008 &nbsp;·&nbsp; All techniques, APT intelligence, detection rules &amp; telemetry</div>
  <div class="sub-links">
    <a href="https://attack.mitre.org/tactics/TA0008/" target="_blank">↗ ATT&amp;CK TA0008</a>
    <a href="https://d3fend.mitre.org" target="_blank">↗ D3FEND</a>
    <a href="https://lolexfil.github.io/" target="_blank">↗ LOLEXFIL</a>

  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Search techniques, IDs, APT groups, tools...">
  <select id="platFilter">
    <option value="">All platforms</option>
    <option>Windows</option>
    <option>Linux</option>
    <option>macOS</option>
    <option>Cloud</option>
    <option>Cross-platform</option>
  </select>
  <select id="catFilter">
    <option value="">All categories</option>
    <option>Remote Services</option>
    <option>Credential Abuse</option>
    <option>Session Hijacking</option>
    <option>LOLBin</option>
    <option>Protocol Abuse</option>
    <option>Exploitation</option>
    <option>Phishing</option>
    <option>Replication</option>
    <option>Cloud</option>
    <option>Tool Transfer</option>
    <option>Supply Chain</option>
    <option>Kerberos</option>
  </select>
  <div class="apt-filter-wrap">
    <input type="text" class="apt-search-input" id="aptSearch" placeholder="Filter APT group..." autocomplete="off" onfocus="openAptDrop()" oninput="filterAptOpts()">
    <div class="apt-dropdown" id="aptDropdown"></div>

/* ── diagram renderer ─────────────────────────────────────────────────── */
let d3VizCounter = 0;

function buildD3fendDiagram(techId){
  const diagType = d3TechMap[techId];
  if(!diagType) return '';
  const diag = d3Diagrams[diagType];
  if(!diag) return '';

  const uid = 'd3v' + (++d3VizCounter);
  const {NW, NH, C, R, VBW} = D3G;

  const allSlots = [...(diag.slots||[])];
  const allExtra = [...(diag.extra||[])];

  /* Compute max row used */
  const maxRi = Math.max(
    ...allSlots.map(s=>s.ri),
    ...allExtra.map(e=>e.ri),
    1
  );
  const vbH = R[maxRi] + NH + 18;

  /* Artifact center */
  const ACX = C[1] + NW/2;  // center x of middle column
  const ACY = R[1] + NH/2;  // center y of row 1

  /* ── Connector lines ─────────────────────────────────── */
  let connSVG = '';

  function connLine(nx, ny, nw, nh){
    /* node center */
    const ncx = nx + nw/2, ncy = ny + nh/2;
    /* pick start/end edges based on relative position */
    let x1, y1, x2, y2;
    const dx = ACX - ncx, dy = ACY - ncy;

    if(Math.abs(dx) >= Math.abs(dy)){
      // horizontal dominant
      if(dx > 0){ x1=nx+nw; y1=ncy; x2=C[1];    y2=ACY; }
      else       { x1=nx;    y1=ncy; x2=C[1]+NW; y2=ACY; }
    } else {
      // vertical dominant
      if(dy > 0){ x1=ncx; y1=ny+nh; x2=ACX; y2=R[1];    }
      else       { x1=ncx; y1=ny;    x2=ACX; y2=R[1]+NH; }
    }
    /* midpoint slight curve */
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const bx=mx+(y2-y1)*0.08, by=my-(x2-x1)*0.08;
    connSVG += `<path d="M${x1},${y1} Q${bx},${by} ${x2},${y2}"
      fill="none" stroke="#2e2e38" stroke-width="1"
      marker-end="url(#d3arr_${uid})"/>`;
  }

  /* slots */
  allSlots.forEach(s => {
    const nx=C[s.ci], ny=R[s.ri];
    connLine(nx, ny, NW, NH);
  });
  /* extra */
  allExtra.forEach(e => {
    const nx=e.x, ny=R[e.ri];
    connLine(nx, ny, NW, NH);
  });

  /* ── Node SVG builder ─────────────────────────────────── */
  function nodeHTML(nx, ny, nw, nh, node){
    /* Split title into up to 2 lines at space */
    const words = node.title.split(' ');
    let L1='', L2='';
    for(const w of words){
      if(!L1||(L1+' '+w).length<=18) L1=(L1?L1+' ':'')+w;
      else { L2=(L2?L2+' ':'')+w; }
    }
    const hasL2 = !!L2;
    const textY1 = hasL2 ? ny+nh/2-14 : ny+nh/2-8;
    const textY2 = ny+nh/2-1;
    const idY    = ny+nh-13;
    return `<g class="d3n ${node.cls}"
      onclick="d3Open('${node.url}')"
      data-id="${node.id}"
      data-title="${(node.title||'').replace(/"/g,'&quot;')}"
      data-tac="${(node.tac||'').replace(/"/g,'&quot;')}"
      data-desc="${(node.desc||'').replace(/"/g,'&quot;')}">
      <rect x="${nx}" y="${ny}" width="${nw}" height="${nh}" rx="7"/>
      <text x="${nx+nw/2}" y="${textY1}" text-anchor="middle"
        style="font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;font-size:11.5px;font-weight:600;fill:#e8e8f0"
        dominant-baseline="central">${esc(L1)}</text>
      ${hasL2?`<text x="${nx+nw/2}" y="${textY2}" text-anchor="middle"
        style="font-family:'IBM Plex Sans','Segoe UI',system-ui,sans-serif;font-size:11.5px;font-weight:600;fill:#e8e8f0"
        dominant-baseline="central">${esc(L2)}</text>`:''}
      <text x="${nx+nw/2}" y="${idY}" text-anchor="middle"
        style="font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:9.5px;fill:#6060a0"
        dominant-baseline="central">${esc(node.id)}</text>
    </g>`;
  }

  let nodesSVG = '';

  /* slots */
  allSlots.forEach(s => {
    nodesSVG += nodeHTML(C[s.ci], R[s.ri], NW, NH, s);
  });
  /* extra */
  allExtra.forEach(e => {
    nodesSVG += nodeHTML(e.x, R[e.ri], NW, NH, e);
  });

  /* Artifact center node */
  const artSVG = `<g class="d3n d3n-art"
    onclick="d3Open('${diag.artifact.url}')"
    data-id="${diag.artifact.id}"
    data-title="${diag.label}"
    data-tac="Digital Artifact"
    data-desc="D3FEND Digital Artifact: ${diag.artifact.id}">
    <rect x="${C[1]}" y="${R[1]}" width="${NW}" height="${NH}" rx="7"
      style="fill:#131630;stroke:#818cf8;stroke-width:1.5"/>
    <text x="${ACX}" y="${R[1]+NH/2-9}" text-anchor="middle"
      style="font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:12.5px;font-weight:700;fill:#818cf8"
      dominant-baseline="central">${esc(diag.label)}</text>
    <text x="${ACX}" y="${R[1]+NH/2+10}" text-anchor="middle"
      style="font-family:'Fira Code','Cascadia Code','Consolas',monospace;font-size:9px;fill:#5a5a70"
      dominant-baseline="central">${esc(diag.artifact.id)}</text>
  </g>`;

  /* Legend items (unique tactics in this diagram) */
  const tacSet = new Map();
  allSlots.forEach(s=>tacSet.set(s.tac, D3_TACTIC_COLORS[s.tac]||'#9898b0'));
  allExtra.forEach(e=>tacSet.set(e.tac, D3_TACTIC_COLORS[e.tac]||'#9898b0'));
  const legendHTML = [...tacSet.entries()].map(([tac,col])=>
    `<div class="d3viz-leg"><div class="d3viz-leg-dot" style="background:${col}"></div>${esc(tac)}</div>`
  ).join('');

  return `
<div class="d3viz-wrap" id="${uid}_wrap">
  <div class="d3viz-toggle" id="${uid}_btn" onclick="toggleD3Viz('${uid}')">
    <span class="d3v-arr">▸</span>
    <span style="font-weight:600;color:var(--text)">D3FEND Defensive Technique Map</span>
    <span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)">${esc(diag.label)}</span>
    <span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg);color:var(--text3);border:1px solid var(--border)">${diag.stats.techniques} techniques · ${diag.stats.tactics} tactics</span>
    <span style="margin-left:auto;font-size:10px;color:var(--text3)">click to expand</span>
  </div>
  <div class="d3viz-body" id="${uid}_body">
    <svg viewBox="0 0 ${VBW} ${vbH}" xmlns="http://www.w3.org/2000/svg"
      style="width:100%;height:auto;display:block;overflow:visible">
      <defs>
        <marker id="d3arr_${uid}" viewBox="0 0 10 10" refX="8" refY="5"
          markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1.5L8 5L2 8.5" fill="none" stroke="#3a3a50"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      ${connSVG}
      ${nodesSVG}
      ${artSVG}
    </svg>
    <div class="d3viz-legend">${legendHTML}</div>
    <div class="d3viz-meta">
      <span>Artifact: <a href="${diag.artifact.url}" target="_blank">${esc(diag.artifact.id)}</a></span>
      <span>Source: <a href="https://d3fend.mitre.org" target="_blank">d3fend.mitre.org</a></span>
      <span>Hover for details · Click node to open D3FEND</span>
    </div>
  </div>
</div>`;
}

function toggleD3Viz(uid){
  document.getElementById(uid+'_btn').classList.toggle('open');
  document.getElementById(uid+'_body').classList.toggle('open');
}
function d3Open(url){ window.open(url,'_blank'); }

/* Shared tooltip */
(function(){
  const tip = document.createElement('div');
  tip.className = 'd3-itip'; tip.id='d3GlobalTip';
  document.body.appendChild(tip);
  document.addEventListener('mouseover', e => {
    const n = e.target.closest('.d3n[data-id]');
    if(!n){ tip.classList.remove('vis'); return; }
    const col = D3_TACTIC_COLORS[n.dataset.tac]||'#9898b0';
    tip.innerHTML =
      `<span class="tip-title">${n.dataset.title||''}</span>`+
      `<span class="tip-id" style="color:${col}">${n.dataset.id} &nbsp;·&nbsp; ${n.dataset.tac}</span>`+
      `<span class="tip-desc">${n.dataset.desc||''}</span>`;
    tip.classList.add('vis');
  });
  document.addEventListener('mousemove', e => {
    if(!tip.classList.contains('vis')) return;
    let x=e.clientX+14, y=e.clientY+14;
    if(x+268>window.innerWidth)  x=e.clientX-268-14;
    if(y+110>window.innerHeight) y=e.clientY-110-14;
    tip.style.left=x+'px'; tip.style.top=y+'px';
  });
  document.addEventListener('mouseout', e=>{
    if(!e.target.closest('.d3n[data-id]')) tip.classList.remove('vis');
  });
})();

function buildSections(t){
  const ext = extData[t.id] || {};
  const tel = telData[t.id] || [];
  let html = '';

  // ── APT Intelligence ──────────────────────────────────────────────────
  if(ext.apt && ext.apt.length){
    html += '<div class="intel-sep"></div>';
    html += '<div class="section-label" style="margin-bottom:8px">APT / Threat Actor Intelligence</div>';
    html += '<div style="overflow-x:auto;margin-bottom:16px"><table class="apt-table">';
    html += '<tr class="apt-th"><td>Actor</td><td>Nation</td><td>Active</td><td>Target Sectors &amp; Victims</td><td>Campaigns &amp; DFIR Reports</td><td>Target Countries</td><td>Ref</td></tr>';
    ext.apt.forEach(a => {
      const ex = aptExtra[a.alias] || {};
      const timeline = ex.first_seen && ex.first_seen !== '—'
        ? `<div class="apt-timeline"><span class="apt-fs">▶ ${ex.first_seen}</span><span class="apt-ls">⬛ ${ex.last_seen||'2024'}</span></div>` : '';
      const active = ex.first_seen && ex.first_seen !== '—' ? `${ex.first_seen}–${ex.last_seen||'now'}` : '—';
      const victims = ex.targets ? `<span class="apt-victims">${esc(ex.targets)}</span>` : '';
      const pmHtml = (ex.postmortem && ex.postmortem.length)
        ? '<div class="apt-pm">' + ex.postmortem.map(p=>`<a href="${p.url}" target="_blank" class="apt-pm-link">${esc(p.name)}</a>`).join('') + '</div>' : '';
      const ctryHtml = (ex.target_countries && ex.target_countries.length)
        ? '<div class="apt-countries">'+ex.target_countries.map(c=>`<span class="apt-ctry">${esc(c)}</span>`).join('')+'</div>'
        : '<span style="color:var(--text3);font-size:11px">—</span>';
      html += `<tr>
        <td><span class="apt-name">${esc(a.name)}</span>${a.alias?`<span class="apt-alias">${esc(a.alias)}</span>`:''}${timeline}</td>
        <td class="apt-nation">${esc(a.nation)}</td>
        <td style="font-size:11px;font-family:var(--mono);color:var(--text3);white-space:nowrap">${active}</td>
        <td class="apt-sectors">${esc(a.sectors)}${victims}</td>
        <td><div class="apt-campaigns">${esc(a.campaigns)}</div>${pmHtml}</td>
        <td>${ctryHtml}</td>
        <td><a href="${a.ref}" target="_blank" class="apt-ref-link">ATT&amp;CK ↗</a></td>
      </tr>`;
    });
    html += '</table></div>';
  }

  // ── Intel Grid: Simulation Refs + Detection Rules ────────────────────
  const nonD3Rules = (ext.rules||[]).filter(r => r.src !== 'D3FEND');
  const hasSimOrRules = true; // always show sim refs
  html += '<div class="intel-sep"></div>';
  html += '<div class="intel-grid">';

  // Simulation References
  html += '<div><div class="section-label" style="margin-bottom:8px">Simulation References</div>';
  const attckIds = (t.attck||[t.id]);
  const simId = attckIds[0];
  const simUrl = `https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/${simId}/${simId}.md`;
  html += `<div class="ti-item"><span class="ti-src">Atomic Red Team</span><span class="ti-text"><a href="${simUrl}" target="_blank">${simId} — Atomic Simulation Tests ↗</a></span></div>`;
  attckIds.forEach(id => {
    const techUrl = `https://attack.mitre.org/techniques/${id.replace('.','/').replace('.','/') }/`;
    html += `<div class="ti-item"><span class="ti-src">MITRE ATT&amp;CK</span><span class="ti-text"><a href="${techUrl}" target="_blank">${id} — Technique page ↗</a></span></div>`;
  });
  attckIds.forEach(id => {
    html += `<div class="ti-item"><span class="ti-src">D3FEND</span><span class="ti-text"><a href="https://d3fend.mitre.org/offensive-technique/attack/${id}/" target="_blank">${id} — D3FEND countermeasures ↗</a></span></div>`;
  });
  if(ext.ti && ext.ti.length){
    ext.ti.forEach(ti => {
      html += `<div class="ti-item"><span class="ti-src">${esc(ti.src)}</span><span class="ti-text"><a href="${ti.link}" target="_blank">${esc(ti.text)}</a></span></div>`;
    });
  }
  html += '</div>';

  // Detection Rules
  if(nonD3Rules.length){
    const srcCls = {SigmaHQ:'src-sigma',Elastic:'src-elastic',Splunk:'src-splunk',Sentinel:'src-sentinel',CAR:'src-car',D3FEND:'src-d3fend',ATT:'src-attck',CISA:'src-d3fend','Azure Monitor':'src-elastic',CloudTrail:'src-elastic','Microsoft TI':'src-sentinel',Audit:'src-car'};
    html += '<div><div class="section-label" style="margin-bottom:8px">Detection Rules &amp; References</div>';
    nonD3Rules.forEach(r => {
      const cls = srcCls[r.src] || 'src-sigma';
      html += `<div class="rule-item"><span class="rule-src ${cls}">${esc(r.src)}</span><div><a href="${r.link}" target="_blank" class="rule-link">${esc(r.name)}</a><span class="rule-note">${esc(r.note)}</span></div></div>`;
    });
    html += '</div>';
  } else {
    html += '<div></div>'; // grid spacer
  }
  html += '</div>'; // end intel-grid

  // ── Merged Telemetry + Detection table ───────────────────────────────
  const hasTel = tel.length > 0;
  const hasDet = t.detections && t.detections.length > 0;
  if(hasTel || hasDet){
    const sevRank  = {critical:4,high:3,med:2,medium:2,low:1};
    const sevClass = {critical:'hi-critical',high:'hi-high',med:'hi-med',medium:'hi-med',low:'hi-low'};
    const sevName  = {4:'critical',3:'high',2:'med',1:'low',0:''};

    function normSrc(s){
      s=(s||'').toLowerCase();
      if(s.includes('windows security')||s==='eventlog'||s==='event log') return 'WS-LOG';
      if(s.includes('windows system')) return 'WSystem';
      if(s.includes('sysmon for linux')) return 'SysmonLinux';
      if(s.includes('sysmon')) return 'Sysmon';
      if(s.includes('cloudtrail')||s==='cloudtrail'||s==='aws') return 'CloudTrail';
      if(s.includes('azure ad')||s==='azuread') return 'AzureAD';
      if(s.includes('m365')||s.includes('unified audit')) return 'M365Audit';
      if(s.includes('linux auditd')||s==='auditd'||s==='linux') return 'Auditd';
      if(s.includes('powershell')) return 'PSScriptBlock';
      if(s.includes('edr')) return 'EDR';
      if(s.includes('network')||s==='network'||s.includes('firewall')) return 'Network';
      if(s.includes('kubernetes')||s==='k8saudit') return 'K8sAudit';
      if(s.includes('active directory')||s.includes('ldap')) return 'AD-LDAP';
      if(s.includes('sql')) return 'SQLAudit';
      if(s.includes('fim')||s==='file') return 'FIM';
      if(s.includes('vpc')||s.includes('flow log')) return 'VPCFlow';
      if(s.includes('dns')) return 'DNSLogs';
      if(s.includes('wmi')) return 'WMILog';
      if(s.includes('web')||s.includes('proxy')||s.includes('iis')) return 'WebProxy';
      if(s.includes('ueba')) return 'UEBA';
      if(s.includes('imds')||s.includes('metadata')) return 'IMDS';
      if(s.includes('azure activity')||s.includes('azure monitor')) return 'AzureActivity';
      if(s.includes('gcp')) return 'GCPAudit';
      if(s.includes('env variable')||s.includes('shell history')) return 'ShellEnv';
      if(s.includes('auth log')||s.includes('/var/log')) return 'AuthLog';
      if(s.includes('registry')) return 'Registry';
      return s.replace(/\s+/g,'-').replace(/[^a-z0-9-]/gi,'').slice(0,22);
    }
    function detTypeKey(type){
      const t2=(type||'').toLowerCase();
      if(t2==='eventlog'||t2==='registry') return 'WS-LOG';
      if(t2==='cloudtrail') return 'CloudTrail';
      if(t2==='azuread') return 'AzureAD';
      if(t2==='powershell') return 'PSScriptBlock';
      if(t2==='edr'||t2==='memory') return 'EDR';
      if(t2==='network'||t2==='ids'||t2==='firewall') return 'Network';
      if(t2==='auth') return 'AuthLog';
      if(t2==='siem'||t2==='ueba') return 'UEBA';
      if(t2==='wmi') return 'WMILog';
      if(t2==='sql') return 'SQLAudit';
      if(t2==='service') return 'WSystem';
      if(t2==='process') return 'Sysmon';
      if(t2==='file'||t2==='fim'||t2==='audit') return 'FIM';
      if(t2==='ldap'||t2==='ad') return 'AD-LDAP';
      if(t2==='honeypot') return 'UEBA';
      return t2.replace(/\s+/g,'-').slice(0,22);
    }
    const groups = new Map();
    const groupOrder = [];
    tel.forEach(entry => {
      const k = normSrc(entry.src);
      if(!groups.has(k)){ groups.set(k,{src:entry.src,ids:[],notes:[],sev:0}); groupOrder.push(k); }
      const g = groups.get(k);
      if(entry.ids) g.ids.push(entry.ids);
      if(entry.note) g.notes.push(entry.note);
      const r = sevRank[entry.sev||'']||0; if(r>g.sev) g.sev=r;
    });
    (t.detections||[]).forEach(det => {
      const k = detTypeKey(det.type);
      if(groups.has(k)){
        const g = groups.get(k);
        const already = g.notes.join(' ').toLowerCase();
        const fw = det.text.toLowerCase().split(/[^a-z]/)[0];
        if(fw.length>3 && !already.includes(fw)){ g.notes.push(det.text); }
        else if(g.notes.length===0){ g.notes.push(det.text); }
        const r = sevRank[det.sev||'']||0; if(r>g.sev) g.sev=r;
      } else {
        groups.set(k,{src:det.type,ids:[],notes:[det.text],sev:sevRank[det.sev||'']||0});
        groupOrder.push(k);
      }
    });
    html += '<div class="intel-sep"></div>';
    html += '<div class="section-label" style="margin-bottom:8px">Required Telemetry Sources and Detection Patterns</div>';
    html += '<div style="overflow-x:auto"><table class="teldet-table">';
    html += '<tr class="teldet-th"><td>Source</td><td>Event IDs / Identifiers</td><td>Detection Pattern</td><td>Sev</td></tr>';
    groupOrder.forEach(k => {
      const g = groups.get(k);
      const sn = sevName[g.sev]||'';
      const sc = sevClass[sn]||'';
      const allIds = [...new Set(g.ids.flatMap(x=>x.split(',').map(s=>s.trim())))].join(', ')||'—';
      const seen2 = new Set();
      const mergedNote = g.notes.filter(n => {
        const key = n.slice(0,45).toLowerCase().replace(/[^a-z0-9]/g,'');
        if(seen2.has(key)) return false; seen2.add(key); return true;
      }).join(' · ');
      html += `<tr><td class="td-src">${esc(g.src)}</td><td class="td-ids">${esc(allIds)}</td><td class="td-pattern">${esc(mergedNote)}</td><td class="td-sev ${sc}">${sn}</td></tr>`;
    });
    html += '</table></div>';
  }

  // ── D3FEND Countermeasures (both detect + harden) ────────────────────
  const d3Rules = (ext.rules||[]).filter(r => r.src === 'D3FEND');
  if(d3Rules.length){
    html += '<div class="intel-sep"></div>';
    html += '<div class="section-label" style="margin-bottom:8px">D3FEND Countermeasures</div>';
    html += '<div class="d3-list">';
    d3Rules.forEach(r => {
      // Determine type from note content
      const noteL = (r.note||'').toLowerCase();
      const type = noteL.includes('detect')||noteL.includes('monitor')||noteL.includes('analysis')||noteL.includes('anomaly') ? 'detect' : 'harden';
      const cls = type==='detect' ? 'd3-detect' : 'd3-harden';
      html += `<div class="d3-row"><span class="d3-type ${cls}">${type}</span><span class="d3-desc"><a href="${r.link}" target="_blank">${esc(r.name)}</a>${r.note ? ' — ' + esc(r.note) : ''}</span></div>`;
    });
    html += '</div>';
    html += buildD3fendDiagram(t.id);
  }

  return html;
}

// ═══════════════════════════ DROPDOWNS ══════════════════════════════════
function buildAptDropdown(){
  const all = [...new Set(allAptEntries().map(a => a.name))].sort();
  const q = (document.getElementById('aptSearch').value||'').toLowerCase();
  const filtered = q ? all.filter(n => n.toLowerCase().includes(q)) : all;
  const dd = document.getElementById('aptDropdown');
  dd.innerHTML = filtered.map(name => {
    const sel = selectedApts.has(name);
    return `<div class="apt-opt${sel?' sel':''}" onclick="toggleFilter('apt','${esc(name)}')">${esc(name)}</div>`;
  }).join('');
}
function openAptDrop(){ document.getElementById('aptDropdown').classList.add('open'); buildAptDropdown(); }
function filterAptOpts(){ buildAptDropdown(); }

function buildMsDropdown(type){
  const input = document.getElementById(type+'Search');
  const q = (input ? input.value : '').toLowerCase();
  let all;
  if(type === 'nation'){
    all = [...new Set(allAptEntries().map(a => a.nation).filter(Boolean))].sort();
  } else {
    all = [...new Set(allAptEntries().flatMap(a => (a.sectors||'').split(',').map(s=>s.trim()).filter(Boolean)))].sort();
  }
  const filtered = q ? all.filter(v => v.toLowerCase().includes(q)) : all;
  const sel = type==='nation' ? selectedNations : selectedSectors;
  const dd = document.getElementById(type+'Dropdown');
  dd.innerHTML = filtered.map(val => {
    const isS = sel.has(val);
    return `<div class="ms-opt${isS?' sel':''}" onclick="toggleFilter('${type}','${esc(val)}')">${esc(val)}</div>`;
  }).join('');
}
function openMsDrop(type){ document.getElementById(type+'Dropdown').classList.add('open'); buildMsDropdown(type); }
function filterMsOpts(type){ buildMsDropdown(type); }

function toggleFilter(type, val){
  const sets = {apt:selectedApts, nation:selectedNations, sector:selectedSectors};
  const s = sets[type];
  if(s.has(val)) s.delete(val); else s.add(val);
  renderActiveTags();
  render();
  if(type==='apt') buildAptDropdown();
  else buildMsDropdown(type);
}

function renderActiveTags(){
  const bar = document.getElementById('activeTagsBar');
  const chips = [];
  selectedApts.forEach(v => chips.push(`<span class="filter-chip fc-apt" onclick="toggleFilter('apt','${esc(v)}')">${esc(v)} ×</span>`));
  selectedNations.forEach(v => chips.push(`<span class="filter-chip fc-nation" onclick="toggleFilter('nation','${esc(v)}')">${esc(v)} ×</span>`));
  selectedSectors.forEach(v => chips.push(`<span class="filter-chip fc-sector" onclick="toggleFilter('sector','${esc(v)}')">${esc(v)} ×</span>`));
  bar.innerHTML = chips.join('');
  bar.style.display = chips.length ? 'flex' : 'none';
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if(!e.target.closest('.apt-filter-wrap')) document.getElementById('aptDropdown').classList.remove('open');
  if(!e.target.closest('#nationSearch') && !e.target.closest('#nationDropdown')) document.getElementById('nationDropdown').classList.remove('open');
  if(!e.target.closest('#sectorSearch') && !e.target.closest('#sectorDropdown')) document.getElementById('sectorDropdown').classList.remove('open');
});

// ═══════════════════════════ RENDER ══════════════════════════════════════
function render(){
  const q  = (document.getElementById('search').value||'').toLowerCase().trim();
  const pf = document.getElementById('platFilter').value;
  const cf = document.getElementById('catFilter').value;

  let filtered = tools.filter(t => {
    // text search — include APT names from extData
    const aptNames = ((extData[t.id]||{}).apt||[]).map(a=>a.name).join(' ');
    const hay = [t.id, t.name, t.desc, t.platform, t.category, t.attck.join(' '), aptNames].join(' ').toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(pf && !t.platform.split(',').map(x=>x.trim()).includes(pf)) return false;
    if(cf && t.category !== cf) return false;

    // APT filter
    if(selectedApts.size > 0){
      const tApts = ((extData[t.id]||{}).apt||[]).map(a => a.name);
      if(![...selectedApts].some(sa => tApts.some(a => a.includes(sa) || sa.includes(a)))) return false;
    }
    // Nation filter
    if(selectedNations.size > 0){
      const tNations = ((extData[t.id]||{}).apt||[]).map(a => a.nation);
      if(![...selectedNations].some(n => tNations.includes(n))) return false;
    }
    // Sector filter
    if(selectedSectors.size > 0){
      const tSectors = ((extData[t.id]||{}).apt||[]).flatMap(a => (a.sectors||'').split(',').map(s=>s.trim()));
      if(![...selectedSectors].some(s => tSectors.includes(s))) return false;
    }
    return true;
  });

  const totalDet = filtered.reduce((s,t) => s + t.detections.length, 0);
  document.getElementById('statsBar').innerHTML = `
    <span>Showing <b>${filtered.length}</b> / <b>${tools.length}</b> techniques</span>
    <span><b>${totalDet}</b> detection patterns</span>
    <span>Tactic: <b>TA0008 Lateral Movement</b></span>
    <span>MITRE ATT&amp;CK — Techniques + APT Intel + Telemetry + Rules</span>
  `;

  const list = document.getElementById('list');
  if(!filtered.length){ list.innerHTML='<div class="no-results">No techniques match your filters.</div>'; return; }

  list.innerHTML = filtered.map(t => {
    const isExp = allExpanded || expanded[t.id];
    const iocHtml = (t.iocs||[]).map(i => `<div><span class="ioc-type">${esc(i.type)}</span>${esc(i.val)}</div>`).join('');
    const plats = t.platform.split(',').map(p => `<span class="badge ${platBadgeMap[p.trim()]||'b-gray'}">${p.trim()}</span>`).join('');
    const catBadge = catBadgeMap[t.category] || 'b-gray';
    const sigLabel = t.signed ? `<span class="badge b-green">signed</span>` : `<span class="badge b-coral">unsigned</span>`;
    const aptCount = ((extData[t.id]||{}).apt||[]).length;

    return `<div class="card${isExp?' expanded':''}" id="c_${t.id}">
      <div class="card-head" onclick="toggle('${t.id}')">
        <div style="flex:1">
          <div class="card-title">${esc(t.name)} <span style="font-size:11px;color:#4a4a60;font-family:var(--mono);font-weight:400;margin-left:4px">${t.id}</span></div>
          <div class="card-desc">${esc(t.desc.substring(0,130))}${t.desc.length>130?'…':''}</div>
          <div class="card-meta">
            ${plats}
            <span class="badge ${catBadge}">${t.category}</span>
            ${t.attck.map(id=>`<a class="badge b-blue" href="https://attack.mitre.org/techniques/${id.replace('.','/')}/" target="_blank">${id}</a>`).join('')}
            ${sigLabel}
            <span class="badge b-gray">${t.detections.length} detections</span>
            ${aptCount ? `<span class="badge b-purple">${aptCount} APT groups</span>` : ''}
          </div>
        </div>
        <div class="chevron">▼</div>
      </div>
      <div class="card-body">
        <p style="font-size:13px;color:#9898b0;line-height:1.6;margin-bottom:16px">${esc(t.desc)}</p>
        <div class="grid2">
          <div>
            <div class="section-label">Simulation Command</div>
            <div class="code-block">${esc(t.sim)}</div>
          </div>
          <div>
            <div class="section-label">IOC Artifacts (${(t.iocs||[]).length})</div>
            <div class="ioc-list">${iocHtml||'<div style="color:#4a4a60;font-size:12px">—</div>'}</div>
          </div>
        </div>
        ${buildSections(t)}
        <div class="footer-bar">
          <span>MITRE ATT&amp;CK: ${t.attck.map(id=>`<a href="https://attack.mitre.org/techniques/${id.replace('.','/')}/" target="_blank" style="color:#60a5fa">${id}</a>`).join(', ')}</span>
          <span><b>${t.detections.length}</b> detection patterns</span>
          <span><b>${(t.iocs||[]).length}</b> IOC artifacts</span>
          ${aptCount ? `<span><b>${aptCount}</b> APT groups</span>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggle(id){
  expanded[id] = !expanded[id];
  const card = document.getElementById('c_'+id);
  if(card) card.classList.toggle('expanded', !!expanded[id]);
}

document.getElementById('expandAll').addEventListener('click', function(){
  allExpanded = !allExpanded;
  this.textContent = allExpanded ? 'Collapse all' : 'Expand all';
  expanded = {};
  render();
});

['search','platFilter','catFilter'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
});

// Init
renderActiveTags();
render();
</script>
